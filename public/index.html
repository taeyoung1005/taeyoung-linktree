<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>taeyoung5075 — terminal</title>
    <meta name="description" content="taeyoung5075 — indie hacker. building stuff. ship fast, learn faster." />
    <meta name="theme-color" content="#0d0d0d" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="taeyoung5075" />
    <meta property="og:description" content="indie hacker · building stuff · ship fast, learn faster." />
    <meta property="og:url" content="https://parktaeyoung.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="taeyoung5075" />
    <meta name="twitter:description" content="indie hacker · building stuff · ship fast, learn faster." />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230d0d0d'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-family='ui-monospace,Menlo,monospace' font-size='52' font-weight='700' fill='%23E07A5F'%3E%26gt;_%3C/text%3E%3C/svg%3E" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg-page: #0d0d0d;
        --bg-panel: #1a1a1a;
        --bg-chrome: #252525;
        --bg-surface: #2a2a2a;

        --text-primary: #d8d8d8;
        --text-secondary: #888;
        --text-dimmed: #666;
        --text-faint: #555;

        --accent: #E07A5F;
        --accent-light: #E89A84;

        --tg-green: #27c93f;
        --tg-red:   #ff5f56;
        --tg-yellow:#ffbd2e;
        --tg-cyan:  #00ffff;
        --tg-blue:  #60a5fa;

        --line: #333;
        --line-soft: #2a2a2a;

        --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
        --max: 900px;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }

      body {
        height: 100dvh;
        background: var(--bg-page);
        color: var(--text-primary);
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding: 10px;
        display: flex;
        overflow: hidden;
      }

      ::selection { background: var(--accent); color: var(--bg-page); }

      .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        min-height: 0;
      }

      /* ── header ────────────────────────────────────────────── */
      .chrome {
        flex-shrink: 0;
        background: var(--bg-chrome);
        border-bottom: 1px solid var(--line);
      }
      .chrome-inner {
        max-width: var(--max);
        margin: 0 auto;
        padding: 10px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .lights { display: flex; gap: 6px; align-items: center; }
      .lights .dot { width: 12px; height: 12px; border-radius: 50%; }
      .dot.r { background: var(--tg-red); }
      .dot.y { background: var(--tg-yellow); }
      .dot.g { background: var(--tg-green); }
      .chrome-title {
        color: var(--text-secondary);
        font-size: 13px;
        margin-left: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .chrome-status {
        color: var(--text-dimmed);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .chrome-status .pulse {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--tg-green);
        box-shadow: 0 0 6px var(--tg-green);
        animation: pulse 2s ease-in-out infinite;
      }

      /* ── body ──────────────────────────────────────────────── */
      .body {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }
      .body-inner {
        max-width: var(--max);
        margin: 0 auto;
        padding: 24px 24px 14px;
        min-height: 100%;
      }

      .line { white-space: pre-wrap; word-break: break-word; }
      .line + .line { margin-top: 2px; }
      .gap { height: 12px; }
      .gap-sm { height: 6px; }

      /* prompt parts */
      .pu { color: var(--tg-green); }
      .at { color: var(--text-dimmed); }
      .ph { color: var(--tg-cyan); }
      .pc { color: var(--text-dimmed); }
      .pp { color: var(--tg-blue); }
      .pd { color: var(--text-primary); margin: 0 6px 0 0; }
      .cmd { color: var(--text-primary); }

      .muted { color: var(--text-secondary); }
      .dim { color: var(--text-dimmed); }
      .faint { color: var(--text-faint); }
      .accent { color: var(--accent); }
      .accent-l { color: var(--accent-light); }
      .ok { color: var(--tg-green); }
      .err { color: var(--tg-red); }
      .info { color: var(--tg-blue); }
      .warn { color: var(--tg-yellow); }
      .cyan { color: var(--tg-cyan); }
      .magenta { color: #c084fc; }

      /* social link rows */
      .link {
        display: inline-grid;
        grid-template-columns: 14px 110px 168px auto;
        align-items: center;
        gap: 14px;
        text-decoration: none;
        color: inherit;
        padding: 2px 6px;
        margin-left: -6px;
        border-radius: 4px;
        transition: background 0.12s ease, transform 0.12s ease;
      }
      .link .arr { color: var(--text-dimmed); }
      .link .name { color: var(--accent); font-weight: 500; }
      .link .handle { color: var(--text-secondary); }
      .link .url { color: var(--text-dimmed); font-size: 13px; }
      .link:hover, .link:focus-visible {
        background: rgba(224,122,95,0.08);
        transform: translateX(4px);
        outline: none;
      }
      .link:hover .arr, .link:focus-visible .arr { color: var(--accent); }
      .link:hover .name, .link:focus-visible .name { color: var(--accent-light); }
      .link:hover .handle, .link:focus-visible .handle { color: var(--text-primary); }
      .link:hover .url, .link:focus-visible .url { color: var(--accent-light); }

      /* caret */
      .caret {
        display: inline-block;
        width: 7px;
        height: 14px;
        background: var(--text-primary);
        vertical-align: -2px;
        margin-left: 2px;
        animation: blink 1s step-end infinite;
      }
      .caret.accent { background: var(--accent); }
      @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

      /* ── status bar ────────────────────────────────────────── */
      .statusbar {
        flex-shrink: 0;
        background: var(--bg-panel);
        border-top: 1px solid var(--line);
      }
      .status-inner {
        max-width: var(--max);
        margin: 0 auto;
        padding: 6px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        font-size: 11px;
        color: var(--text-faint);
      }
      .status-left { display: flex; align-items: center; gap: 18px; }
      .stat .v { color: var(--text-dimmed); }
      .lang { color: var(--text-faint); }
      .lang button {
        background: none; border: none;
        color: var(--text-faint);
        font: inherit;
        cursor: pointer;
        padding: 0 2px;
      }
      .lang button.on { color: var(--accent); }

      /* ── command bar ───────────────────────────────────────── */
      .cmdbar {
        position: relative;
        flex-shrink: 0;
        background: var(--bg-panel);
        border-top: 1px solid var(--line);
      }
      .cmdbar-inner {
        max-width: var(--max);
        margin: 0 auto;
        padding: 10px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .cmd-prompt {
        color: var(--accent);
        font-weight: 600;
        flex-shrink: 0;
      }
      .cmd-input-wrap {
        flex: 1;
        position: relative;
        display: flex;
        align-items: baseline;
        gap: 12px;
        min-width: 0;
      }
      #cmdInput {
        flex: 1;
        min-width: 0;
        background: transparent;
        border: none;
        outline: none;
        font: inherit;
        color: var(--text-primary);
        caret-color: var(--accent);
        padding: 2px 0;
      }
      #cmdInput::placeholder { color: var(--text-faint); }
      .cmd-hint {
        color: var(--text-faint);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 50%;
        flex-shrink: 0;
      }
      .cmd-hint .k {
        display: inline-block;
        padding: 1px 6px;
        background: var(--bg-surface);
        border: 1px solid var(--line);
        border-radius: 3px;
        color: var(--text-dimmed);
        font-size: 11px;
        margin: 0 2px;
      }
      .cmd-hint .acc { color: var(--accent); }
      @media (max-width: 720px) { .cmd-hint { display: none; } }

      .enter-btn {
        flex-shrink: 0;
        width: 32px; height: 32px;
        background: var(--bg-surface);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text-secondary);
        font: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.12s ease;
      }
      .enter-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg-page);
      }
      .enter-btn:active { transform: translateY(1px); }

      /* command palette dropdown */
      .palette {
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        width: min(calc(100% - 48px), calc(var(--max) - 48px));
        background: var(--bg-chrome);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.5);
        max-height: 280px;
        overflow-y: auto;
        z-index: 100;
        display: none;
      }
      .palette.show { display: block; animation: paletteIn 0.14s ease; }
      @keyframes paletteIn {
        from { opacity: 0; transform: translate(-50%, 4px); }
        to   { opacity: 1; transform: translate(-50%, 0); }
      }
      .palette-head {
        padding: 8px 14px;
        font-size: 11px;
        color: var(--text-dimmed);
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
      }
      .palette-item {
        display: grid;
        grid-template-columns: 28px 130px 1fr;
        align-items: center;
        gap: 12px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 13px;
        border-bottom: 1px solid var(--line-soft);
      }
      .palette-item:last-child { border-bottom: none; }
      .palette-item .num {
        font-size: 11px;
        color: var(--text-dimmed);
        text-align: center;
        background: var(--bg-surface);
        border: 1px solid var(--line);
        border-radius: 3px;
        padding: 1px 0;
      }
      .palette-item .pname { color: var(--accent); font-weight: 500; }
      .palette-item .pdesc { color: var(--text-secondary); }
      .palette-item.active, .palette-item:hover {
        background: var(--accent);
      }
      .palette-item.active .num, .palette-item:hover .num {
        background: rgba(0,0,0,0.25);
        border-color: transparent;
        color: var(--bg-page);
      }
      .palette-item.active .pname, .palette-item:hover .pname,
      .palette-item.active .pdesc, .palette-item:hover .pdesc {
        color: var(--bg-page);
      }

      /* scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

      /* responsive */
      @media (max-width: 640px) {
        body { padding: 6px; font-size: 13px; }
        .chrome-inner, .status-inner, .cmdbar-inner {
          padding-left: 14px; padding-right: 14px;
        }
        .body-inner { padding: 18px 14px 12px; }
        .chrome-title { font-size: 12px; }
        .chrome-status { display: none; }
        .link { grid-template-columns: 12px 96px 1fr; gap: 12px; }
        .link .url { display: none; }
        .status-inner { font-size: 10px; }
        .status-left .stat:nth-child(2) { display: none; }
      }

      @media (prefers-reduced-motion: reduce) {
        .caret, .pulse { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <!-- header -->
      <header class="chrome">
        <div class="chrome-inner">
          <div class="lights" aria-hidden="true">
            <span class="dot r"></span>
            <span class="dot y"></span>
            <span class="dot g"></span>
            <span class="chrome-title">taeyoung@parktaeyoung — bash</span>
          </div>
          <div class="chrome-status">
            <span class="pulse"></span>
            <span>online</span>
          </div>
        </div>
      </header>

      <!-- body -->
      <main class="body" id="body">
        <div class="body-inner" id="out"></div>
      </main>

      <!-- status bar -->
      <div class="statusbar">
        <div class="status-inner">
          <div class="status-left">
            <span class="stat">MEM <span class="v" id="memStat">--</span></span>
            <span class="stat">CPU <span class="v" id="cpuStat">--</span></span>
            <span class="stat">UP <span class="v" id="upStat">00:00:00</span></span>
          </div>
          <div class="lang">
            <span class="v">v1.0.0</span> · <span>en_US.UTF-8</span>
          </div>
        </div>
      </div>

      <!-- command bar -->
      <div class="cmdbar">
        <div class="cmdbar-inner">
          <span class="cmd-prompt">&gt;</span>
          <div class="cmd-input-wrap">
            <input
              id="cmdInput"
              type="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="type a command... (e.g. /help, /x, 1)"
              aria-label="command input"
            />
            <span class="cmd-hint" id="cmdHint">
              <span class="dim">next:</span> <span class="acc">[1] /x</span> <span class="dim">·</span> @taeyoung5075
            </span>
          </div>
          <button class="enter-btn" id="enterBtn" type="button" aria-label="run">↵</button>
        </div>

        <!-- palette dropdown -->
        <div class="palette" id="palette" role="listbox" aria-label="commands">
          <div class="palette-head">
            <span>commands</span>
            <span><kbd>↑↓</kbd> navigate · <kbd>↵</kbd> run · <kbd>Esc</kbd> close</span>
          </div>
          <div id="paletteList"></div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        // ── elements ─────────────────────────────────────────────
        var out      = document.getElementById("out");
        var bodyEl   = document.getElementById("body");
        var input    = document.getElementById("cmdInput");
        var enterBtn = document.getElementById("enterBtn");
        var palette  = document.getElementById("palette");
        var paletteList = document.getElementById("paletteList");
        var hintEl   = document.getElementById("cmdHint");

        // ── command registry ─────────────────────────────────────
        var SOCIALS = [
          { key: "1", aliases: ["/x", "/twitter"],   label: "/x",         desc: "X / Twitter @taeyoung5075",      url: "https://x.com/taeyoung5075" },
          { key: "2", aliases: ["/instagram", "/ig"], label: "/instagram", desc: "Instagram @taeyoung5075",        url: "https://instagram.com/taeyoung5075" },
          { key: "3", aliases: ["/threads"],          label: "/threads",   desc: "Threads @taeyoung5075",          url: "https://www.threads.net/@taeyoung5075" },
          { key: "4", aliases: ["/youtube", "/yt"],   label: "/youtube",   desc: "YouTube @taeyoung5075",          url: "https://www.youtube.com/@taeyoung5075" },
          { key: "5", aliases: ["/tiktok", "/tt"],    label: "/tiktok",    desc: "TikTok @taeyoung5075",           url: "https://www.tiktok.com/@taeyoung5075" }
        ];

        var COMMANDS = SOCIALS.map(function (s, i) {
          return {
            num: String(i + 1),
            primary: s.label,
            aliases: s.aliases.concat([s.key]),
            desc: s.desc,
            run: function () { runSocial(s); }
          };
        }).concat([
          { num: "·", primary: "/about",   aliases: ["/whoami", "/me"],        desc: "profile / whoami",       run: cmdAbout },
          { num: "·", primary: "/links",   aliases: ["/ls", "ls"],             desc: "list social links",      run: cmdLinks },
          { num: "·", primary: "/help",    aliases: ["/?", "?", "help"],       desc: "show available commands", run: cmdHelp },
          { num: "·", primary: "/clear",   aliases: ["/cls", "clear", "cls"],  desc: "clear the terminal",      run: cmdClear },
          { num: "·", primary: "/uptime",  aliases: [],                         desc: "system status",          run: cmdUptime },
          { num: "·", primary: "/echo",    aliases: [],                         desc: "/echo <text>",           run: cmdEcho }
        ]);

        // ── helpers ──────────────────────────────────────────────
        var skipped = false;
        var sequenceDone = false;
        function sleep(ms) {
          return new Promise(function (r) {
            if (skipped) return r();
            setTimeout(r, ms);
          });
        }
        function el(tag, cls, html) {
          var n = document.createElement(tag);
          if (cls) n.className = cls;
          if (html != null) n.innerHTML = html;
          return n;
        }
        function autoscroll() { bodyEl.scrollTop = bodyEl.scrollHeight; }
        function appendInstant(html, cls) {
          var div = el("div", "line" + (cls ? " " + cls : ""), html);
          out.appendChild(div);
          autoscroll();
          return div;
        }
        function gap(small) {
          var g = el("div", small ? "gap-sm" : "gap");
          out.appendChild(g);
          return g;
        }

        async function typeInto(node, text, speed) {
          if (skipped) { node.textContent = text; autoscroll(); return; }
          for (var i = 0; i < text.length; i++) {
            node.textContent += text[i];
            autoscroll();
            var jitter = (Math.random() - 0.5) * (speed * 0.6);
            await sleep(Math.max(4, speed + jitter));
          }
        }

        function promptHTML() {
          return (
            '<span class="pu">taeyoung</span><span class="at">@</span>' +
            '<span class="ph">parktaeyoung</span><span class="pc">:</span>' +
            '<span class="pp">~</span><span class="pd">$</span>' +
            '<span class="cmd"></span>'
          );
        }
        async function typeCommand(cmd, speed) {
          var line = appendInstant(promptHTML());
          var slot = line.querySelector(".cmd");
          slot.textContent = " ";
          await sleep(120);
          await typeInto(slot, cmd, speed);
        }
        async function typeLine(text, opts) {
          opts = opts || {};
          var speed = opts.speed || 14;
          var cls = opts.cls || "";
          var line = appendInstant("", cls);
          await typeInto(line, text, speed);
        }
        function printPrompt(cmd) {
          var line = appendInstant(promptHTML());
          line.querySelector(".cmd").textContent = " " + cmd;
        }
        function printLine(text, cls) { appendInstant(text, cls); }
        function printHTML(html, cls) { appendInstant(html, cls); }

        async function typeLinkRow(opts, speed) {
          var a = el("a", "link");
          a.href = opts.url;
          a.target = "_blank";
          a.rel = "me noopener";
          var arr = el("span", "arr"); arr.textContent = "→";
          var name = el("span", "name");
          var handle = el("span", "handle");
          var url = el("span", "url");
          a.appendChild(arr); a.appendChild(name); a.appendChild(handle); a.appendChild(url);
          out.appendChild(a);
          autoscroll();
          await typeInto(name, opts.name, speed);
          await typeInto(handle, "@" + opts.handle, speed);
          await typeInto(url, opts.url.replace(/^https?:\/\//, ""), Math.max(4, speed - 4));
        }

        function printLinkRow(opts) {
          var a = el("a", "link");
          a.href = opts.url; a.target = "_blank"; a.rel = "me noopener";
          a.innerHTML =
            '<span class="arr">→</span>' +
            '<span class="name">' + opts.name + '</span>' +
            '<span class="handle">@' + opts.handle + '</span>' +
            '<span class="url">' + opts.url.replace(/^https?:\/\//, "") + '</span>';
          out.appendChild(a);
          autoscroll();
        }

        // ── command implementations ──────────────────────────────
        function runSocial(s) {
          appendInstant(
            '<span class="info">→ opening</span> <span class="accent">' +
            s.url.replace(/^https?:\/\//, "") + '</span> <span class="dim">…</span>'
          );
          setTimeout(function () {
            window.open(s.url, "_blank", "noopener");
          }, 80);
        }
        function cmdAbout() {
          printLine("taeyoung5075", "accent-l");
          printLine("# indie hacker · building in public", "muted");
          printLine("ship fast, learn faster.", "muted");
          printLine("constantly shipping →", "dim");
        }
        function cmdLinks() {
          SOCIALS.forEach(function (s) {
            printLinkRow({
              name: s.label,
              handle: "taeyoung5075",
              url: s.url
            });
          });
        }
        function cmdHelp() {
          printLine("available commands:", "muted");
          COMMANDS.forEach(function (c) {
            var aliases = c.aliases.length ? "  (" + c.aliases.join(", ") + ")" : "";
            printHTML(
              '<span class="dim">  ' + (c.num !== "·" ? "[" + c.num + "]" : "   ") + '</span> ' +
              '<span class="accent">' + c.primary + '</span>' +
              '<span class="faint">' + aliases + '</span>' +
              '<span class="dim"> — ' + c.desc + '</span>'
            );
          });
        }
        function cmdClear() {
          out.innerHTML = "";
          printLine("// cleared. type /help or /links", "dim");
        }
        // (English already used elsewhere)
        function cmdUptime() {
          printLine("[system] served from cloudflare-workers · theme claude-code", "dim");
          printLine("MEM " + document.getElementById("memStat").textContent +
                   " · CPU " + document.getElementById("cpuStat").textContent +
                   " · UP "  + document.getElementById("upStat").textContent, "dim");
        }
        function cmdEcho(rest) {
          printLine(rest && rest.length ? rest : " ", "muted");
        }

        // ── execute ──────────────────────────────────────────────
        function findCommand(token) {
          token = token.toLowerCase();
          for (var i = 0; i < COMMANDS.length; i++) {
            var c = COMMANDS[i];
            if (c.primary.toLowerCase() === token) return c;
            if (c.num === token) return c;
            for (var j = 0; j < c.aliases.length; j++) {
              if (c.aliases[j].toLowerCase() === token) return c;
            }
          }
          return null;
        }

        var history = [];
        var histIdx = -1;

        function execute(rawIn) {
          var raw = (rawIn || "").trim();
          if (!raw) return;
          history.push(raw); if (history.length > 80) history.shift();
          histIdx = history.length;

          // print the prompt + entered command
          printPrompt(raw);

          // parse: first token is command, rest is arg
          var firstSpace = raw.indexOf(" ");
          var token = firstSpace === -1 ? raw : raw.slice(0, firstSpace);
          var rest  = firstSpace === -1 ? ""  : raw.slice(firstSpace + 1);

          var cmd = findCommand(token);
          if (!cmd) {
            printHTML(
              '<span class="err">command not found:</span> ' +
              '<span class="muted">' + escapeHtml(token) + '</span> ' +
              '<span class="dim">— try </span><span class="accent">/help</span>'
            );
            return;
          }
          if (cmd.primary === "/echo") cmd.run(rest);
          else cmd.run();
        }

        function escapeHtml(s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
          });
        }

        // ── palette ──────────────────────────────────────────────
        var paletteIdx = -1;
        var paletteFiltered = [];

        function openPalette(filter) {
          var query = (filter || "").toLowerCase();
          paletteFiltered = COMMANDS.filter(function (c) {
            if (!query) return true;
            if (c.primary.toLowerCase().indexOf(query) === 0) return true;
            for (var i = 0; i < c.aliases.length; i++) {
              if (c.aliases[i].toLowerCase().indexOf(query) === 0) return true;
            }
            return false;
          });
          renderPalette();
          if (paletteFiltered.length) {
            palette.classList.add("show");
            paletteIdx = 0;
            highlightPalette();
          } else {
            closePalette();
          }
        }
        function closePalette() {
          palette.classList.remove("show");
          paletteIdx = -1;
        }
        function renderPalette() {
          paletteList.innerHTML = "";
          paletteFiltered.forEach(function (c, i) {
            var row = el("div", "palette-item");
            row.dataset.index = i;
            row.innerHTML =
              '<span class="num">' + c.num + '</span>' +
              '<span class="pname">' + c.primary + '</span>' +
              '<span class="pdesc">' + c.desc + '</span>';
            row.addEventListener("click", function () {
              input.value = c.primary;
              closePalette();
              submit();
            });
            paletteList.appendChild(row);
          });
        }
        function highlightPalette() {
          var rows = paletteList.querySelectorAll(".palette-item");
          rows.forEach(function (r, i) {
            r.classList.toggle("active", i === paletteIdx);
            if (i === paletteIdx) r.scrollIntoView({ block: "nearest" });
          });
        }

        // ── input handlers ───────────────────────────────────────
        function submit() {
          var v = input.value;
          input.value = "";
          execute(v);
          closePalette();
          autoscroll();
        }

        enterBtn.addEventListener("click", function () {
          submit();
          input.focus();
        });

        input.addEventListener("input", function () {
          var v = input.value.trim();
          if (v.indexOf("/") === 0) {
            openPalette(v);
          } else if (v.length === 0) {
            closePalette();
          } else {
            closePalette();
          }
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            if (palette.classList.contains("show") && paletteIdx >= 0 && paletteFiltered[paletteIdx]) {
              input.value = paletteFiltered[paletteIdx].primary;
            }
            submit();
            return;
          }
          if (e.key === "Escape") {
            closePalette();
            return;
          }
          if (e.key === "Tab") {
            e.preventDefault();
            var v = input.value.trim();
            if (palette.classList.contains("show") && paletteFiltered.length) {
              // cycle palette
              paletteIdx = (paletteIdx + (e.shiftKey ? -1 : 1) + paletteFiltered.length) % paletteFiltered.length;
              highlightPalette();
              return;
            }
            // autocomplete
            var match = COMMANDS.find(function (c) {
              return c.primary.toLowerCase().indexOf(v.toLowerCase()) === 0;
            });
            if (match) input.value = match.primary;
            return;
          }
          if (palette.classList.contains("show")) {
            if (e.key === "ArrowDown") {
              e.preventDefault();
              paletteIdx = (paletteIdx + 1) % paletteFiltered.length;
              highlightPalette();
              return;
            }
            if (e.key === "ArrowUp") {
              e.preventDefault();
              paletteIdx = (paletteIdx - 1 + paletteFiltered.length) % paletteFiltered.length;
              highlightPalette();
              return;
            }
          } else {
            // history when palette is closed
            if (e.key === "ArrowUp" && history.length) {
              e.preventDefault();
              histIdx = Math.max(0, histIdx - 1);
              input.value = history[histIdx] || "";
              return;
            }
            if (e.key === "ArrowDown" && history.length) {
              e.preventDefault();
              histIdx = Math.min(history.length, histIdx + 1);
              input.value = history[histIdx] || "";
              return;
            }
          }
          // numeric shortcut on empty input
          if (input.value === "" && /^[1-5]$/.test(e.key)) {
            e.preventDefault();
            var s = SOCIALS[parseInt(e.key, 10) - 1];
            if (s) {
              printPrompt(e.key);
              runSocial(s);
            }
          }
        });

        // global: focus input when typing anywhere
        document.addEventListener("keydown", function (e) {
          if (e.metaKey || e.ctrlKey || e.altKey) return;
          if (document.activeElement === input) return;
          // skip the autoplay if running
          if (!sequenceDone && !skipped) {
            skipped = true;
            return;
          }
          if (e.key.length === 1 || e.key === "/" || e.key === "Backspace") {
            input.focus();
          }
        });

        // click anywhere in panel focuses input (unless on a link)
        document.querySelector(".panel").addEventListener("click", function (e) {
          if (e.target.closest("a")) return;
          if (e.target.closest(".palette")) return;
          if (e.target.tagName === "BUTTON") return;
          if (sequenceDone || skipped) input.focus();
        });

        // ── footer ticks ─────────────────────────────────────────
        var start = Date.now();
        var pad = function (n) { return n < 10 ? "0" + n : "" + n; };
        function tickStat() {
          var s = Math.floor((Date.now() - start) / 1000);
          document.getElementById("upStat").textContent =
            pad(Math.floor(s / 3600)) + ":" + pad(Math.floor((s % 3600) / 60)) + ":" + pad(s % 60);
          document.getElementById("memStat").textContent =
            (42 + Math.round(Math.sin(s / 4) * 6 + Math.random() * 3)) + "MB";
          document.getElementById("cpuStat").textContent =
            (1 + Math.round(Math.random() * 4)) + "%";
        }
        tickStat();
        setInterval(tickStat, 1000);

        // rotate hint (only when input is empty)
        var hints = [
          ['<span class="dim">next:</span> <span class="acc">[1] /x</span> <span class="dim">·</span> @taeyoung5075'],
          ['<span class="dim">try</span> <span class="acc">/help</span> <span class="dim">— all commands</span>'],
          ['<span class="dim">tip:</span> <span class="acc">Tab</span> <span class="dim">to autocomplete</span>'],
          ['<span class="dim">tip:</span> <span class="acc">↑↓</span> <span class="dim">for history</span>'],
          ['<span class="dim">next:</span> <span class="acc">[2] /instagram</span> <span class="dim">·</span> @taeyoung5075'],
          ['<span class="dim">next:</span> <span class="acc">[4] /youtube</span> <span class="dim">·</span> @taeyoung5075']
        ];
        var hi = 0;
        setInterval(function () {
          if (input.value !== "") return;
          hi = (hi + 1) % hints.length;
          hintEl.innerHTML = hints[hi];
        }, 2800);

        // ── content sequence ─────────────────────────────────────
        async function run() {
          await sleep(180);

          await typeCommand("whoami", 22);
          await sleep(140);
          await typeLine("taeyoung5075", { speed: 14, cls: "accent-l" });
          gap();

          await typeCommand("cat about.md", 18);
          await sleep(140);
          await typeLine("# indie hacker · building in public", { speed: 12, cls: "muted" });
          await typeLine("ship fast, learn faster.", { speed: 12, cls: "muted" });
          await typeLine("constantly shipping →", { speed: 12, cls: "dim" });
          gap();

          await typeCommand("ls socials/", 18);
          await sleep(120);
          for (var i = 0; i < SOCIALS.length; i++) {
            await typeLinkRow({ name: SOCIALS[i].label, handle: "taeyoung5075", url: SOCIALS[i].url }, 8);
            await sleep(60);
          }
          gap();

          await typeLine("[system] type /help or press 1-5 to follow", { speed: 8, cls: "dim" });

          sequenceDone = true;
          // focus input when sequence is done
          setTimeout(function () { input.focus(); }, 200);
        }

        run();
      })();
    </script>
  </body>
</html>
